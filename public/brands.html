<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>teletext — brand picker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #09090b; color: #aaa; font-family: 'Inter', sans-serif; font-size: 14px; padding: 40px 20px; }
  h1 { text-align: center; font-size: 24px; color: #eee; margin-bottom: 4px; letter-spacing: 0.1em; }
  .sub { text-align: center; color: #555; font-size: 14px; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 32px; max-width: 1100px; margin: 0 auto; }

  .brand {
    border: 1px solid #1a1a1e;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .brand:hover { border-color: #333; }

  .brand-head {
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    background: #0e0e12;
    border-bottom: 1px solid #1a1a1e;
  }
  .brand-num { color: #444; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .brand-domain { color: #666; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .brand-mood { color: #555; font-size: 12px; }
  .brand-fonts { color: #444; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

  /* Mock screen */
  .mock {
    height: 320px;
    display: grid;
    grid-template-columns: 240px 1fr 220px;
    overflow: hidden;
  }
  .m-sidebar, .m-main, .m-wall {
    padding: 16px 14px;
    overflow: hidden;
  }
  .m-sidebar { border-right: 1px solid; }
  .m-wall { border-left: 1px solid; }

  .m-logo { letter-spacing: 0.15em; padding-bottom: 12px; }
  .m-clock { font-size: 36px; font-weight: 500; line-height: 1; }
  .m-date { font-size: 11px; margin-top: 6px; letter-spacing: 0.08em; }
  .m-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 16px; margin-bottom: 4px; }
  .m-temp { font-size: 14px; margin-bottom: 2px; }
  .m-detail { font-size: 11px; }
  .m-hol { font-size: 11px; display: flex; gap: 8px; padding: 1px 0; }

  .m-header { display: flex; justify-content: space-between; padding-bottom: 10px; font-size: 12px; }
  .m-ticker { font-size: 11px; padding: 6px 0; white-space: nowrap; overflow: hidden; }
  .m-headline { font-size: 22px; font-weight: 400; line-height: 1.2; margin: 12px 0 10px; }
  .m-bullet { font-size: 12px; padding: 2px 0; }
  .m-progress { display: flex; gap: 2px; margin-top: auto; padding-top: 10px; }
  .m-pip { flex: 1; height: 2px; }

  .m-wtitle { font-size: 11px; letter-spacing: 0.1em; padding-bottom: 8px; }
  .m-input { width: 100%; font-size: 11px; padding: 4px 6px; border: 1px solid; margin-bottom: 6px; background: transparent; }
  .m-post { padding: 6px 0; font-size: 11px; }
  .m-postname { font-size: 12px; }
  .m-posttext { font-size: 11px; padding: 2px 0; }
  .m-postmeta { font-size: 10px; }
</style>
</head>
<body>

<div class="sub">20 combinations — name, fonts, colors, mood</div>
<div class="grid" id="grid"></div>

<script>

    up: "#60a878", down: "#c07060", border: "#181e28", surface: "#101420"
  }
];

var grid = document.getElementById('grid');

brands.forEach(function(b) {
  var el = document.createElement('div');
  el.className = 'brand';

  var isLight = b.bg.charAt(1) > '9';
  var borderC = b.border;

  el.innerHTML =
    '<div class="brand-head">' +
      '<div>' +
        '<span class="brand-num">#' + b.num + '</span> ' +
        '<span style="color:#ddd; font-size:16px;">#' + b.num + '</span>' +
      '</div>' +
      '<div style="text-align:right;">' +
        '<div class="brand-mood">' + b.mood + '</div>' +
        '<div class="brand-fonts">' + b.sans.replace(/'/g,'') + ' + ' + b.mono.replace(/'/g,'') + '</div>' +

    '</div>' +
    '<div class="mock" style="background:' + b.bg + '; color:' + b.text + ';">' +

      '</div>' +

      /* Main */

        '<div class="m-header"><span style="font-family:' + b.sans + ',sans-serif; color:' + b.accent + ';">Headlines</span><span style="color:' + b.dim + ';">⚙</span></div>' +

          '<span style="color:' + borderC + ';"> · </span>' +
          '<span style="color:' + b.accent2 + ';">S&P</span> <span style="color:' + b.text + ';">5,420</span> <span style="color:' + b.down + ';">-0.3%</span>' +
          '<span style="color:' + borderC + ';"> · </span>' +
          '<span style="color:' + b.accent2 + ';">GOLD</span> <span style="color:' + b.text + ';">2,348</span> <span style="color:' + b.up + ';">+0.5%</span>' +
        '</div>' +
        '<div style="font-family:' + b.mono + ',monospace; font-size:10px; color:' + b.accent2 + '; padding-top:10px;">BBC · 2h ago</div>' +
        '<div class="m-headline" style="font-family:' + b.sans + ',sans-serif; color:' + b.accent + ';">Global leaders gather for climate summit in Berlin</div>' +

        '<div class="m-bullet" style="font-family:' + b.sans + ',sans-serif; font-weight:300;"><span style="color:' + b.up + ';">▶</span> New framework to replace Paris timeline</div>' +
        '<div class="m-progress">' +
          '<span class="m-pip" style="background:' + b.accent + ';"></span>' +
          '<span class="m-pip" style="background:' + borderC + ';"></span>' +
          '<span class="m-pip" style="background:' + borderC + ';"></span>' +
          '<span class="m-pip" style="background:' + borderC + ';"></span>' +
          '<span class="m-pip" style="background:' + borderC + ';"></span>' +

</body>
