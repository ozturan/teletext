<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>teletext — final four</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b;
    font-family: 'VT323', monospace;
    color: #a0a0a0;
    padding: 40px 20px;
  }
  h1 {
    text-align: center; font-size: 28px;
    color: #e0e0e0; margin-bottom: 6px;
    letter-spacing: 0.3em;
  }
  .sub {
    text-align: center; color: #505050;
    font-size: 18px; margin-bottom: 40px;
  }
  .grid {
    display: grid; grid-template-columns: 1fr;
    gap: 48px; max-width: 1300px; margin: 0 auto;
  }
  .card {
    border: 1px solid #1a1a1e;
    overflow: hidden; cursor: pointer;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #333; }
  .card-head {
    padding: 12px 16px;
    display: flex; justify-content: space-between;
    align-items: baseline; background: #0e0e12;
  }
  .card-name { font-size: 22px; color: #d0d0d0; }
  .card-desc { font-size: 16px; color: #505050; }
  .card-copied { color: #50c878; font-size: 16px; display: none; }

  .screen {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    grid-template-rows: auto 1fr;
    height: 440px;
    font-size: 16px; line-height: 1.3;
  }
  .s-top {
    grid-column: 1 / -1;
    padding: 4px 14px;
    display: flex; justify-content: space-between;
    align-items: center; font-size: 18px;
  }
  .s-page {
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .s-bar {
    padding: 3px 12px; font-size: 16px;
    display: flex; justify-content: space-between;
    flex-shrink: 0;
  }
  .s-body {
    flex: 1; padding: 8px 12px; overflow: hidden;
  }
  .s-sec {
    font-size: 16px; padding: 6px 0 2px;
    letter-spacing: 0.06em;
  }
  .s-row {
    font-size: 15px; padding: 1px 0;
    display: flex; gap: 6px;
  }
  .s-div {
    font-size: 10px; line-height: 1;
    padding: 4px 0 2px; opacity: 0.2;
    overflow: hidden; white-space: nowrap;
  }
  .s-dbl {
    font-size: 17px;
    transform: scaleY(1.5);
    transform-origin: top left;
    display: inline-block;
    margin-bottom: 14px; line-height: 1;
  }
  .s-ticker {
    font-size: 14px; padding: 3px 12px;
    white-space: nowrap; overflow: hidden;
  }
  .s-post {
    padding: 5px 0; font-size: 14px;
  }
  .s-inp {
    width: 100%; padding: 3px 5px;
    font-family: 'VT323', monospace;
    font-size: 14px; border: 1px solid;
    margin-bottom: 3px; border-radius: 0;
  }
</style>
</head>
<body>
<h1>FINAL FOUR</h1>
<div class="sub">click to copy CSS</div>
<div class="grid" id="grid"></div>

<script>
var P = [
  {
    name: "Ink",
    desc: "Blue-black ink on dark paper. Quiet, precise, like a Muji notebook at midnight.",
    bg:"#0c0e12", accent:"#8aa0b8", accent2:"#687888", up:"#70a080", down:"#a87070",
    text:"#a8b0b8", dim:"#404850", border:"#181e24", surface:"#121820",
    bar:"#10141a", headline:"#8aa0b8", label:"#687888"
  },
  {
    name: "Vignelli",
    desc: "Neutral base, one confident red. The subway map, the American Airlines logo.",
    bg:"#101010", accent:"#cc6b5a", accent2:"#8898a4", up:"#6b9e78", down:"#cc6b5a",
    text:"#c4c4c4", dim:"#505458", border:"#202020", surface:"#161616",
    bar:"#131313", headline:"#cc6b5a", label:"#8898a4"
  },
  {
    name: "Rams",
    desc: "Functional minimalism. Cool gray base, warm orange as the only signal color.",
    bg:"#0e0f10", accent:"#d4a072", accent2:"#7090a0", up:"#6a9a78", down:"#a07068",
    text:"#b8bcc0", dim:"#4a5058", border:"#1c1e20", surface:"#141618",
    bar:"#121416", headline:"#d4a072", label:"#7090a0"
  },
  {
    name: "Cream",
    desc: "Light theme. Warm off-white paper, charcoal text, subtle teal and terra cotta.",
    bg:"#f4f1ec", accent:"#2c2c2c", accent2:"#5a7a7a", up:"#4a8a5a", down:"#b85a4a",
    text:"#2c2c2c", dim:"#9a9590", border:"#ddd8d0", surface:"#eae6e0",
    bar:"#ede9e2", headline:"#1a1a1a", label:"#5a7a7a"
  }
];

var grid = document.getElementById('grid');

P.forEach(function(p) {
  var c = document.createElement('div');
  c.className = 'card';

  // For cream theme, card header should also be light
  var isLight = p.name === 'Cream';
  var headBg = isLight ? '#e8e4dc' : '#0e0e12';
  var headText = isLight ? '#2c2c2c' : '#d0d0d0';
  var headDim = isLight ? '#9a9590' : '#505050';

  c.innerHTML =
    '<div class="card-head" style="background:' + headBg + ';">' +
      '<span class="card-name" style="color:' + headText + ';">' + p.name + '</span>' +
      '<span class="card-desc" style="color:' + headDim + ';">' + p.desc + '</span>' +
      '<span class="card-copied">COPIED</span>' +
    '</div>' +
    '<div class="screen" style="background:' + p.bg + '; color:' + p.text + ';">' +

    /* TOP BAR */
    '<div class="s-top" style="grid-column:1/-1; background:' + p.bar + '; border-bottom:1px solid ' + p.border + ';">' +
      '<span style="color:' + p.accent + '; letter-spacing:0.15em; font-size:20px;">TELETEXT</span>' +
      '<span style="color:' + p.dim + ';">Fri 11 Apr 2026 <span style="color:' + p.text + ';">12:30:45</span></span>' +
    '</div>' +

    /* LEFT: P400 INFO */
    '<div class="s-page" style="border-right:1px solid ' + p.border + ';">' +
      '<div class="s-bar" style="background:' + p.bar + '; border-bottom:1px solid ' + p.border + ';">' +
        '<span style="color:' + p.label + ';">INFORMATION</span>' +
        '<span style="color:' + p.dim + ';">P400</span>' +
      '</div>' +
      '<div class="s-body">' +
        '<div class="s-div" style="color:' + p.dim + ';">░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░</div>' +
        '<div class="s-sec" style="color:' + p.accent + ';">WEATHER</div>' +
        '<div class="s-dbl" style="color:' + p.text + ';">14°C  CLOUDY</div>' +
        '<div class="s-row" style="color:' + p.dim + '; font-size:13px;">Wind 12km/h · Humidity 68%</div>' +
        '<div class="s-row" style="color:' + p.dim + '; font-size:13px;">UV 3.2 Mod · AQI 42 Good</div>' +
        '<div class="s-div" style="color:' + p.dim + ';">░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░</div>' +
        '<div class="s-sec" style="color:' + p.accent + ';">HOLIDAYS 🇨🇦</div>' +
        '<div class="s-row"><span style="color:' + p.label + '; min-width:80px;">Apr 18</span><span style="color:' + p.text + ';">Good Friday</span></div>' +
        '<div class="s-row"><span style="color:' + p.label + '; min-width:80px;">Apr 21</span><span style="color:' + p.text + ';">Easter Monday</span></div>' +
        '<div class="s-row"><span style="color:' + p.dim + '; min-width:80px;">May 19</span><span style="color:' + p.dim + ';">Victoria Day</span></div>' +
        '<div class="s-row"><span style="color:' + p.dim + '; min-width:80px;">Jul  1</span><span style="color:' + p.dim + ';">Canada Day</span></div>' +
        '<div class="s-row"><span style="color:' + p.dim + '; min-width:80px;">Aug  4</span><span style="color:' + p.dim + ';">BC Day</span></div>' +
        '<div class="s-div" style="color:' + p.dim + ';">░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░</div>' +
        '<div class="s-sec" style="color:' + p.accent + ';">ON THIS DAY</div>' +
        '<div class="s-row"><span style="color:' + p.label + ';">1970</span><span style="color:' + p.text + '; font-size:14px;"> — Apollo 13 launched from</span></div>' +
        '<div class="s-row"><span style="color:' + p.text + '; font-size:14px; padding-left:42px;">Kennedy Space Center</span></div>' +
      '</div>' +
    '</div>' +

    /* CENTER: P100 NEWS */
    '<div class="s-page" style="display:flex; flex-direction:column;">' +
      '<div class="s-bar" style="background:' + p.bar + '; border-bottom:1px solid ' + p.border + ';">' +
        '<span style="color:' + p.accent + ';">NEWS</span>' +
        '<span style="color:' + p.dim + ';">P100</span>' +
      '</div>' +
      '<div class="s-ticker" style="border-bottom:1px solid ' + p.border + ';">' +
        '<span style="color:' + p.dim + '; font-size:12px;">MARKETS </span>' +
        '<span style="color:' + p.label + ';">BTC</span> <span style="color:' + p.text + ';">84,210</span> <span style="color:' + p.up + ';">+2.1%</span>' +
        '<span style="color:' + p.border + ';"> · </span>' +
        '<span style="color:' + p.label + ';">ETH</span> <span style="color:' + p.text + ';">3,180</span> <span style="color:' + p.down + ';">-0.8%</span>' +
        '<span style="color:' + p.border + ';"> · </span>' +
        '<span style="color:' + p.label + ';">S&P</span> <span style="color:' + p.text + ';">5,420</span> <span style="color:' + p.down + ';">-0.3%</span>' +
        '<span style="color:' + p.border + ';"> · </span>' +
        '<span style="color:' + p.label + ';">GOLD</span> <span style="color:' + p.text + ';">2,348</span> <span style="color:' + p.up + ';">+0.5%</span>' +
      '</div>' +
      '<div class="s-ticker" style="border-bottom:1px solid ' + p.border + ';">' +
        '<span style="color:' + p.dim + '; font-size:12px;">SCORES </span>' +
        '<span style="color:' + p.label + ';">[PL]</span> <span style="color:' + p.accent + ';">ARS 3</span> <span style="color:' + p.dim + ';">@</span> <span style="color:' + p.text + ';">CHE 1</span>' +
        '<span style="color:' + p.border + ';"> · </span>' +
        '<span style="color:' + p.label + ';">[UCL]</span> <span style="color:' + p.text + ';">BAR 1</span> <span style="color:' + p.dim + ';">@</span> <span style="color:' + p.accent + ';">PSG 2</span>' +
        '<span style="color:' + p.border + ';"> · </span>' +
        '<span style="color:' + p.label + ';">[NBA]</span> <span style="color:' + p.text + ';">LAL 98</span> <span style="color:' + p.dim + ';">@</span> <span style="color:' + p.accent + ';">BOS 112</span>' +
      '</div>' +
      '<div style="flex:1; padding:10px 12px; overflow:hidden;">' +
        '<div style="color:' + p.label + '; font-size:13px; padding-bottom:6px;">BBC NEWS · 2h ago</div>' +
        '<div class="s-dbl" style="color:' + p.headline + ';">Global leaders gather for climate summit in Berlin</div>' +
        '<div style="padding-top:4px;">' +
          '<div class="s-row" style="color:' + p.text + '; font-size:15px;"><span style="color:' + p.up + ';">▶</span> Delegates from 140 nations discuss emission targets</div>' +
          '<div class="s-row" style="color:' + p.text + '; font-size:15px;"><span style="color:' + p.up + ';">▶</span> New framework to replace Paris Agreement timeline</div>' +
          '<div class="s-row" style="color:' + p.text + '; font-size:15px;"><span style="color:' + p.up + ';">▶</span> Protesters rally outside venue demanding faster action</div>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex; gap:2px; padding:5px 12px; border-top:1px solid ' + p.border + '; align-items:center;">' +
        '<span style="flex:1; height:2px; background:' + p.accent + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="flex:1; height:2px; background:' + p.border + ';"></span>' +
        '<span style="color:' + p.dim + '; font-size:13px; margin-left:8px;">1/8</span>' +
      '</div>' +
    '</div>' +

    /* RIGHT: P700 WALL */
    '<div class="s-page" style="border-left:1px solid ' + p.border + ';">' +
      '<div class="s-bar" style="background:' + p.bar + '; border-bottom:1px solid ' + p.border + ';">' +
        '<span style="color:' + p.accent + ';">WALL</span>' +
        '<span style="color:' + p.dim + ';">P700 <span style="color:' + p.up + ';">●</span> 3</span>' +
      '</div>' +
      '<div style="padding:3px 12px; font-size:13px; color:' + p.dim + '; border-bottom:1px solid ' + p.border + ';">4 posts · 3 people · 3 countries</div>' +
      '<div style="padding:6px 12px; border-bottom:1px solid ' + p.border + ';">' +
        '<input class="s-inp" style="background:' + p.surface + '; color:' + p.text + '; border-color:' + p.border + ';" value="anon" readonly>' +
        '<div style="display:flex; gap:4px;">' +
          '<input class="s-inp" style="flex:1; background:' + p.surface + '; color:' + p.text + '; border-color:' + p.border + ';" value="hello world" readonly>' +
          '<span style="font-size:17px; color:' + p.accent + '; padding:1px 6px; border:1px solid ' + p.border + '; background:' + p.surface + '; display:flex; align-items:center;">&rarr;</span>' +
        '</div>' +
      '</div>' +
      '<div style="flex:1; padding:0 12px; overflow:hidden;">' +

        '<div class="s-post" style="border-bottom:1px solid ' + p.border + ';">' +
          '<div style="display:flex; justify-content:space-between;">' +
            '<span style="color:' + p.accent + '; font-size:15px;">maya 🇩🇪</span>' +
            '<span style="color:' + p.dim + '; font-size:13px;">2m</span>' +
          '</div>' +
          '<div style="color:' + p.text + '; font-size:15px; padding:2px 0;">anyone watching the summit?</div>' +
          '<div style="color:' + p.dim + '; font-size:12px;"><span style="color:' + p.down + ';">♥</span> 3 · reply</div>' +
          '<div style="height:2px; background:' + p.border + '; margin-top:4px;"><div style="width:85%; height:100%; background:' + p.up + '; opacity:0.6;"></div></div>' +
        '</div>' +

        '<div class="s-post" style="border-bottom:1px solid ' + p.border + ';">' +
          '<div style="display:flex; justify-content:space-between;">' +
            '<span style="color:' + p.accent + '; font-size:15px;">kai 🇯🇵</span>' +
            '<span style="color:' + p.dim + '; font-size:13px;">14m</span>' +
          '</div>' +
          '<div style="color:' + p.label + '; font-size:12px;">↳ maya</div>' +
          '<div style="color:' + p.text + '; font-size:15px; padding:2px 0;">the speeches are really good so far</div>' +
          '<div style="color:' + p.dim + '; font-size:12px;">♥ 1 · reply</div>' +
          '<div style="height:2px; background:' + p.border + '; margin-top:4px;"><div style="width:72%; height:100%; background:' + p.up + '; opacity:0.6;"></div></div>' +
        '</div>' +

        '<div class="s-post" style="border-bottom:1px solid ' + p.border + ';">' +
          '<div style="display:flex; justify-content:space-between;">' +
            '<span style="color:' + p.accent + '; font-size:15px;">leo 🇧🇷</span>' +
            '<span style="color:' + p.dim + '; font-size:13px;">1h</span>' +
          '</div>' +
          '<div style="color:' + p.text + '; font-size:15px; padding:2px 0;">first post on the wall ✌️</div>' +
          '<div style="color:' + p.dim + '; font-size:12px;">♥ 0 · reply</div>' +
          '<div style="height:2px; background:' + p.border + '; margin-top:4px;"><div style="width:40%; height:100%; background:' + p.down + '; opacity:0.6;"></div></div>' +
        '</div>' +

        '<div class="s-post">' +
          '<div style="display:flex; justify-content:space-between;">' +
            '<span style="color:' + p.accent + '; font-size:15px;">sam 🇬🇧</span>' +
            '<span style="color:' + p.dim + '; font-size:13px;">3h</span>' +
          '</div>' +
          '<div style="color:' + p.text + '; font-size:15px; padding:2px 0;">this feels like ceefax</div>' +
          '<div style="color:' + p.dim + '; font-size:12px;">♥ 7 · reply</div>' +
          '<div style="height:2px; background:' + p.border + '; margin-top:4px;"><div style="width:20%; height:100%; background:' + p.down + '; opacity:0.6;"></div></div>' +
        '</div>' +

      '</div>' +
    '</div>' +

    '</div>';

  c.addEventListener('click', function() {
    var css = ':root {\n' +
      '  --bg:      ' + p.bg + ';\n' +
      '  --accent:  ' + p.accent + ';\n' +
      '  --accent2: ' + p.accent2 + ';\n' +
      '  --up:      ' + p.up + ';\n' +
      '  --down:    ' + p.down + ';\n' +
      '  --text:    ' + p.text + ';\n' +
      '  --dim:     ' + p.dim + ';\n' +
      '  --border:  ' + p.border + ';\n' +
      '  --surface: ' + p.surface + ';\n' +
      '  --bar:     ' + p.bar + ';\n' +
      '}';
    navigator.clipboard.writeText(css);
    var cp = c.querySelector('.card-copied');
    cp.style.display = 'inline';
    setTimeout(function() { cp.style.display = 'none'; }, 1500);
  });

  grid.appendChild(c);
});
</script>
</body>
</html>
